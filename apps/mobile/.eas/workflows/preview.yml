name: PR Preview

# Uncomment triggers when ready to automate:
# on:
#   pull_request:
#     branches: ['main']

jobs:
  build_ios:
    type: build
    params:
      platform: ios
      profile: preview

  build_android:
    type: build
    params:
      platform: android
      profile: preview

  comment:
    needs: [build_ios, build_android]
    type: github-comment
    params:
      message: 'Preview builds ready for testing!'
      build_ids:
        - ${{ needs.build_ios.outputs.build_id }}
        - ${{ needs.build_android.outputs.build_id }}
